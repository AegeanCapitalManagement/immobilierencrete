  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

inline:48px;}\n\n@media (prefers-reduced-motion:no-preference){\n  .float{animation:floaty 5s ease-in-out infinite;}\n  .hero-blob,.navy-blob{animation:drift 16s ease-in-out infinite;}\n  .blob-green,.nb2{animation-duration:19s;animation-delay:-4s;}\n}\n@keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-9px);}}\n@keyframes drift{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(24px,-18px) scale(1.06);}}\n\n.btn .arrow{display:inline-block;transition:transform .22s ease;}\n.btn:hover .arrow{transform:translateX(4px);}\n\n/* ---------- buttons ---------- */\n.btn{display:inline-flex;align-items:center;gap:8px;font-size:15px;font-weight:700;padding:16px 30px;border-radius:10px;border:none;transition:transform .18s ease,box-shadow .18s ease,background .18s ease;white-space:nowrap;}\n.btn:active{transform:translateY(1px);}\n.btn-primary{background:var(--blue);color:#fff;box-shadow:0 1px 2px rgba(13,36,56,.08),0 8px 20px -6px rgba(27,84,126,.35);}\n.btn-primary:hover{background:var(--blue-l);box-shadow:0 10px 24px -6px rgba(27,84,126,.45);transform:translateY(-1px);}\n.btn-ghost{background:#fff;color:var(--ink);border:1.5px solid var(--border);}\n.btn-ghost:hover{border-color:var(--blue-l);color:var(--blue-l);}\n.btn-green{background:var(--green);color:#fff;box-shadow:0 8px 20px -6px rgba(30,158,109,.4);}\n.btn-green:hover{background:var(--green-d);transform:translateY(-1px);}\n.btn-ghost-onnavy{background:transparent;color:rgba(255,255,255,.85);border:1.5px solid rgba(255,255,255,.25);}\n.btn-ghost-onnavy:hover{border-color:rgba(255,255,255,.55);color:#fff;}\n\n/* ---------- eyebrow / labels ---------- */\n.eye{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px;}\n.eye-blue{color:var(--blue-l);}\n.eye-green{color:var(--green-d);}\n.eye-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}\n.dot-blue{background:var(--blue-l);}\n.dot-green{background:var(--green);}\n\n/* ---------- header ---------- */\n.header{position:fixed;top:0;inset-inline:0;z-index:200;height:76px;background:rgba(255,255,255,.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(228,233,237,.8);transition:box-shadow .25s;}\n.header.scrolled{box-shadow:0 4px 24px rgba(15,27,36,.06);}\n.header .wrap{height:100%;display:flex;align-items:center;justify-content:space-between;max-width:1440px;}\n.h-brand{display:flex;align-items:center;gap:10px;}\n.h-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--blue) 0%,var(--green) 130%);display:flex;align-items:center;justify-content:center;flex-shrink:0;}\n.h-mark svg{width:16px;height:16px;}\n.h-name{font-size:16px;font-weight:800;color:var(--ink);letter-spacing:-.02em;line-height:1.1;}\n.h-sub{font-size:10px;font-weight:600;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase;}\n.h-logo{height:32px;width:auto;display:block;}\n.h-logo-link{display:flex;align-items:center;}\n.h-nav{display:flex;align-items:center;gap:34px;flex-wrap:nowrap;}\n.h-nav a.nav-link{font-size:14px;font-weight:600;color:var(--muted);position:relative;padding-bottom:2px;transition:color .15s;white-space:nowrap;flex-shrink:0;}\n.h-nav a.nav-link::after{content:'';position:absolute;left:0;right:100%;bottom:-3px;height:2px;background:var(--blue-l);border-radius:2px;transition:right .22s ease;}\n.h-nav a.nav-link:hover{color:var(--ink);}\n.h-nav a.nav-link:hover::after{right:0;}\n.h-cta{display:flex;align-items:center;gap:14px;}\n.h-cta .btn{padding:12px 22px;font-size:14px;}\n.wa-btn{display:flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:12px;background:#25D366;flex-shrink:0;transition:transform .18s ease,box-shadow .18s ease;box-shadow:0 6px 16px -6px rgba(37,211,102,.5);}\n.wa-btn:hover{transform:translateY(-1px);box-shadow:0 10px 20px -6px rgba(37,211,102,.6);}\n.wa-btn svg{width:22px;height:22px;}\n.wa-hidden{display:none !important;}\n.btn:focus-visible,.zone-chip:focus-visible,.menu-btn:focus-visible{outline:2px solid var(--blue-l);outline-offset:2px;}\n.menu-btn{display:none;width:40px;height:40px;border-radius:10px;border:1.5px solid var(--border);background:#fff;align-items:center;justify-content:center;flex-shrink:0;}\n.menu-btn svg{width:18px;height:18px;}\n.mobile-nav{display:none;position:fixed;top:76px;inset-inline:0;background:#fff;border-bottom:1px solid var(--border);box-shadow:0 16px 30px -18px rgba(15,27,36,.18);z-index:199;padding:10px 22px 22px;flex-direction:column;gap:2px;}\n.mobile-nav.open{display:flex;}\n.mobile-nav a{padding:14px 4px;font-size:15px;font-weight:600;color:var(--ink);border-bottom:1px solid var(--border);}\n.mobile-nav a:last-of-type{border-bottom:none;}\n.mobile-nav .btn{margin-top:14px;justify-content:center;}\n\n/* ---------- sticky mobile CTA ---------- */\n.sticky-cta{display:none;position:fixed;bottom:0;inset-inline:0;z-index:190;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--border);padding:12px 16px;box-shadow:0 -8px 24px rgba(15,27,36,.08);transform:translateY(100%);transition:transform .3s ease;}\n.sticky-cta.visible{transform:translateY(0);}\n.sticky-cta-row{display:flex;align-items:center;gap:10px;}\n.sticky-cta .btn{width:100%;justify-content:center;}\n.sticky-cta .wa-btn{width:48px;height:48px;}\n\n/* ---------- whatsapp floating button ---------- */\n.wa-fab{position:fixed;right:22px;bottom:22px;z-index:180;display:flex;align-items:center;gap:10px;background:#25D366;color:#fff;font-size:14px;font-weight:700;padding:14px 20px 14px 14px;border-radius:100px;box-shadow:0 14px 32px -10px rgba(37,211,102,.55);transition:transform .2s ease,box-shadow .2s ease;}\n.wa-fab:hover{transform:translateY(-2px);box-shadow:0 18px 38px -10px rgba(37,211,102,.65);}\n.wa-fab svg{width:22px;height:22px;flex-shrink:0;}\n@media (max-width:900px){\n  .wa-fab{right:16px;bottom:88px;padding:13px 13px;}\n  .wa-fab-label{display:none;}\n}\n\nsection[id]{scroll-margin-top:92px;}\n\n/* ---------- breadcrumb ---------- */\n.breadcrumb{grid-column:1/-1;display:flex;align-items:center;flex-wrap:wrap;gap:6px;font-size:12.5px;color:var(--muted2);margin-bottom:18px;position:relative;z-index:1;}\n.breadcrumb a{color:var(--muted2);font-weight:600;transition:color .15s;}\n.breadcrumb a:hover{color:var(--blue-l);}\n.breadcrumb .bc-sep{opacity:.5;}\n.breadcrumb .bc-current{color:var(--muted);font-weight:600;}\n\n/* ---------- hero ---------- */\n.hero{position:relative;padding-top:76px;background:var(--white);overflow:hidden;}\n.hero-blob{position:absolute;border-radius:50%;filter:blur(70px);pointer-events:none;opacity:.35;}\n.blob-blue{width:520px;height:520px;background:radial-gradient(circle,rgba(46,134,193,.35),transparent 70%);top:-160px;left:-160px;}\n.blob-green{width:460px;height:460px;background:radial-gradient(circle,rgba(30,158,109,.28),transparent 70%);bottom:-140px;right:-100px;}\n.hero-grid{position:relative;z-index:1;display:grid;grid-template-columns:1.05fr .95fr;gap:56px;align-items:center;padding-block:76px 64px;}\n.hero-tag{display:inline-flex;align-items:center;gap:10px;background:var(--blue-pale);border:1px solid #D7E7F3;padding:8px 16px;border-radius:100px;margin-bottom:26px;}\n.hero-tag-txt{font-size:12.5px;font-weight:700;color:var(--blue);letter-spacing:.02em;}\n.hero-h1{font-size:clamp(38px,4.6vw,60px);font-weight:800;line-height:1.08;letter-spacing:-.03em;color:var(--ink);}\n.hero-h1 .accent{color:var(--blue);}\n.hero-h1 .accent-u{position:relative;white-space:nowrap;}\n.hero-h1 .accent-u::after{content:'';position:absolute;left:2px;right:2px;bottom:2px;height:11px;background:var(--green-pale);z-index:-1;border-radius:3px;}\n.hero-p{font-size:18px;font-weight:400;line-height:1.7;color:var(--muted);max-width:520px;margin-top:22px;}\n.hero-ctas{display:flex;align-items:center;gap:14px;margin-top:32px;flex-wrap:wrap;}\n.hero-proof{display:flex;align-items:center;gap:16px;margin-top:34px;}\n.hero-proof-avatar{width:38px;height:38px;border-radius:50%;overflow:hidden;border:2px solid #fff;box-shadow:0 0 0 1px var(--border);flex-shrink:0;}\n.hero-proof-avatar img{width:100%;height:100%;object-fit:cover;}\n.hero-proof-txt{font-size:13.5px;color:var(--muted);line-height:1.5;}\n.hero-proof-txt strong{color:var(--ink);font-weight:700;}\n\n.hero-visual{position:relative;}\n.hero-photo{aspect-ratio:4/3.1;border-radius:22px;position:relative;overflow:hidden;box-shadow:0 30px 70px -20px rgba(13,36,56,.28);}\n.hero-photo image-slot{width:100%;height:100%;display:block;}\n.photo-caption{position:absolute;left:18px;bottom:16px;z-index:1;font-size:12px;font-weight:600;color:#fff;letter-spacing:.01em;display:flex;align-items:center;gap:7px;}\n.photo-caption .cdot{width:5px;height:5px;border-radius:50%;background:#7DDCB0;flex-shrink:0;}\n.ph-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}\n.ph-placeholder svg{width:52px;height:52px;opacity:.5;}\n.hero-card{position:absolute;bottom:-26px;left:-26px;background:#fff;border-radius:16px;padding:18px 22px;box-shadow:0 20px 45px -14px rgba(13,36,56,.22);display:flex;align-items:center;gap:14px;max-width:280px;}\n.hero-card-ic{width:38px;height:38px;border-radius:10px;background:var(--green-pale);display:flex;align-items:center;justify-content:center;flex-shrink:0;}\n.hero-card-t{font-size:13px;font-weight:700;color:var(--ink);line-height:1.35;}\n.hero-card-s{font-size:11.5px;color:var(--muted2);margin-top:2px;}\n.hero-card2{position:absolute;top:-20px;right:-18px;background:#fff;border-radius:14px;padding:12px 16px;box-shadow:0 16px 36px -12px rgba(13,36,56,.2);font-size:12.5px;font-weight:700;color:var(--blue);display:flex;align-items:center;gap:8px;}\n\n/* ---------- reassurance ---------- */\n.reass{background:var(--bg-soft);padding-block:28px;border-block:1px solid var(--border);}\n.reass-row{display:flex;flex-wrap:wrap;gap:14px 40px;justify-content:space-between;}\n.reass-item{display:flex;align-items:center;gap:10px;flex:1;min-width:200px;}\n.reass-ic{width:30px;height:30px;border-radius:9px;background:#fff;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;}\n.reass-txt{font-size:13.5px;font-weight:600;color:var(--ink);}\n\n/* ---------- generic section ---------- */\n.section{padding-block:104px;}\n.section-tight{padding-block:80px;}\n.s-h2{font-size:clamp(30px,3.6vw,44px);font-weight:800;letter-spacing:-.025em;line-height:1.14;color:var(--ink);}\n.s-p{font-size:16.5px;color:var(--muted);line-height:1.75;margin-top:18px;}\n.s-h2-light{color:#fff;}\n.s-h2::after{content:'';display:block;width:52px;height:3px;border-radius:2px;background:linear-gradient(90deg,var(--blue-l),var(--green));margin-top:16px;}\n.s-p-light{color:rgba(255,255,255,.62);}\n\n/* ---------- problem ---------- */\n.prob-grid{display:grid;grid-template-columns:.92fr 1.08fr;gap:72px;align-items:center;}\n.prob-cards{display:flex;flex-direction:column;gap:16px;}\n.prob-card{display:grid;grid-template-columns:46px 1fr;gap:18px;align-items:flex-start;padding:22px 24px;border-radius:16px;background:var(--bg-soft);border:1px solid var(--border);transition:transform .22s ease,box-shadow .22s ease,border-color .22s ease;}\n.prob-card:hover{transform:translateY(-3px);box-shadow:0 16px 34px -16px rgba(15,27,36,.14);border-color:#D7E1E8;}\n.prob-ic{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}\n.ic-blue{background:var(--blue-pale);}\n.ic-green{background:var(--green-pale);}\n.prob-t{font-size:15.5px;font-weight:700;color:var(--ink);margin-bottom:5px;}\n.prob-d{font-size:14px;color:var(--muted);line-height:1.65;}\n\n/* ---------- offer sections (VP / Pack) ---------- */\n.offer-grid{display:grid;grid-template-columns:1fr 1fr;gap:76px;align-items:center;}\n.offer-photo{aspect-ratio:5/4;border-radius:20px;position:relative;overflow:hidden;transition:transform .35s ease;}\n.offer-photo:hover{transform:translateY(-4px);}\n.offer-photo image-slot{width:100%;height:100%;display:block;}\n\n.offer-badge{display:inline-flex;align-items:center;gap:8px;background:var(--blue);color:#fff;font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:7px 14px;border-radius:100px;margin-bottom:20px;}\n.offer-badge-green{background:var(--green);}\n.offer-price{font-size:26px;font-weight:800;color:var(--blue);margin-top:10px;letter-spacing:-.02em;}\n.offer-price-green{color:var(--green-d);}\n.offer-list{display:flex;flex-direction:column;gap:14px;margin-top:26px;}\n.offer-row{display:flex;align-items:flex-start;gap:12px;font-size:14.5px;color:var(--ink);line-height:1.5;font-weight:500;}\n.offer-check{width:20px;height:20px;border-radius:6px;background:var(--blue-pale);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}\n.offer-check-green{background:var(--green-pale);}\n.offer-note{font-size:12.5px;color:var(--muted2);font-weight:600;}\n\n.price-box{background:#fff;border:1.5px solid var(--border);border-radius:18px;padding:22px 26px;margin-top:30px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:16px 20px;box-shadow:0 16px 36px -22px rgba(15,27,36,.18);transition:box-shadow .2s ease,transform .2s ease;}\n.price-box>div:first-child{flex:1 1 200px;min-width:0;}\n.price-box>.btn{flex:0 0 auto;}\n.price-box:hover{box-shadow:0 22px 44px -20px rgba(15,27,36,.24);transform:translateY(-2px);}\n.price-box-label{font-size:11.5px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em;}\n.price-box-amount{font-size:27px;font-weight:800;color:var(--blue);letter-spacing:-.02em;margin-top:3px;}\n.price-box-amount.green{color:var(--green-d);}\n.price-box-note{font-size:12.5px;color:var(--muted2);font-weight:600;margin-top:4px;}\n\n/* ---------- simulateur ---------- */\n.sim-panel{background:linear-gradient(120deg,var(--green-d),var(--green) 120%);border-radius:26px;padding:56px 60px;display:grid;grid-template-columns:1fr auto;gap:44px;align-items:center;position:relative;overflow:hidden;}\n.sim-panel::before{content:'';position:absolute;top:-80px;right:-40px;width:260px;height:260px;border-radius:50%;background:rgba(255,255,255,.08);}\n.sim-h{font-size:clamp(24px,2.6vw,32px);font-weight:800;color:#fff;letter-spacing:-.02em;line-height:1.25;position:relative;}\n.sim-p{font-size:15.5px;color:rgba(255,255,255,.78);margin-top:10px;line-height:1.65;max-width:480px;position:relative;}\n.btn-white-green{background:#fff;color:var(--green-d);position:relative;}\n.btn-white-green:hover{background:#F0FBF5;}\n\n/* ---------- méthode (navy) ---------- */\n.s-navy{background:var(--navy);position:relative;overflow:hidden;}\n.navy-blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.25;pointer-events:none;}\n.nb1{width:460px;height:460px;background:radial-gradient(circle,rgba(46,134,193,.5),transparent 70%);top:-140px;right:-100px;}\n.nb2{width:420px;height:420px;background:radial-gradient(circle,rgba(30,158,109,.4),transparent 70%);bottom:-140px;left:-80px;}\n.meth-steps{display:grid;grid-template-columns:repeat(3,1fr);gap:44px;margin-top:56px;position:relative;z-index:1;}\n.step-card{background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:32px 28px;transition:transform .25s ease,background .25s ease;}\n.step-card:hover{transform:translateY(-4px);background:rgba(255,255,255,.075);}\n.step-n{width:36px;height:36px;border-radius:10px;background:rgba(46,134,193,.18);color:#8FC4E8;font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-bottom:20px;}\n.step-card:nth-child(3) .step-n{background:rgba(30,158,109,.2);color:#7DDCB0;}\n.step-h{font-size:18.5px;font-weight:700;color:#fff;letter-spacing:-.01em;line-height:1.35;margin-bottom:10px;}\n.step-p{font-size:14px;color:rgba(255,255,255,.55);line-height:1.7;}\n\n/* ---------- about / trust ---------- */\n.about-grid{display:grid;grid-template-columns:.62fr 1.38fr;gap:64px;align-items:center;}\n.about-photo{aspect-ratio:3/3.6;border-radius:22px;overflow:hidden;box-shadow:0 24px 60px -20px rgba(15,27,36,.24);}\n.about-photo img{width:100%;height:100%;object-fit:cover;object-position:center 20%;}\n.about-photo image-slot{width:100%;height:100%;display:block;}\n.about-quote{font-size:clamp(20px,2.2vw,26px);font-weight:600;color:var(--ink);line-height:1.5;letter-spacing:-.01em;}\n.about-quote .accent{color:var(--blue);}\n.about-name{font-size:15px;font-weight:800;color:var(--ink);margin-top:24px;}\n.about-role{font-size:13.5px;color:var(--muted2);margin-top:2px;}\n.about-facts{display:flex;gap:32px;margin-top:30px;flex-wrap:wrap;}\n.about-fact{display:flex;align-items:center;gap:10px;font-size:13.5px;font-weight:600;color:var(--muted);}\n.origin-quote{background:var(--green-pale);border:1px solid #CDEEDF;border-radius:16px;padding:22px 24px;margin-top:26px;}\n.origin-quote p{font-size:14.5px;color:var(--ink);line-height:1.7;font-style:italic;margin:0;}\n.origin-name{font-size:12.5px;font-weight:800;color:var(--green-d);margin-top:12px;}\n.origin-name span{font-weight:600;color:var(--muted);}\n.share-bar{display:flex;align-items:center;gap:10px;margin-top:22px;flex-wrap:wrap;}\n.share-label{font-size:12px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.05em;margin-right:2px;}\n.share-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:10px;background:var(--bg-soft);border:1px solid var(--border);transition:transform .15s ease,background .15s ease,border-color .15s ease;flex-shrink:0;}\n.share-btn:hover{transform:translateY(-2px);border-color:var(--blue-l);background:var(--blue-pale);}\n.share-btn svg{width:16px;height:16px;}\n\n/* ---------- zones ---------- */\n.zones-grid{display:
